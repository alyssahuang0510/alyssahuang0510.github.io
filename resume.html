<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>履歷 · Alyssa Huang</title>
<meta name="robots" content="noindex, follow" />

<!-- 依網站目前語言（localStorage: ah-lang）跳轉至對應 PDF。en → 英文版，zh → 中文版。 -->
<script>
(function(){
  var EN = "Alyssa-Huang-Resume-EN.pdf";
  var ZH = "Alyssa-Huang-Resume-ZH.pdf";
  var lang = "en";
  try{ var s = localStorage.getItem("ah-lang"); if(s === "zh" || s === "en") lang = s; }catch(e){}
  window.__resumePDF = (lang === "zh") ? ZH : EN;
  // 立即轉址（replace 不留下中介頁紀錄，返回鍵會直接回到作品集）
  location.replace(window.__resumePDF);
})();
</script>

<style>
:root{
  --bg:#FFFFFF; --ink:#0C0C0D; --ink-2:#3A3A3D; --muted:#6E6E73;
  --rule:#E6E6E4; --accent:#2B4DE0;
  --ff-display:"Schibsted Grotesk","Noto Sans TC",system-ui,sans-serif;
  --ff-mono:"Geist Mono","Noto Sans TC",ui-monospace,monospace;
}
*,*::before,*::after{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--ink);font-family:var(--ff-mono);
  -webkit-font-smoothing:antialiased;padding:24px;}
.box{max-width:420px;text-align:center;}
.dot{display:inline-block;width:8px;height:8px;border-radius:2px;background:var(--accent);margin-bottom:20px;}
.box p{margin:0 0 8px;font-size:.86rem;letter-spacing:.02em;color:var(--ink-2);line-height:1.7;}
.box a{display:inline-block;margin-top:18px;font-size:.8rem;letter-spacing:.03em;
  color:var(--accent);border:1px solid var(--accent);border-radius:6px;
  padding:10px 18px;text-decoration:none;transition:all .18s;}
.box a:hover{background:var(--accent);color:#fff;}
.back{display:block;margin-top:14px;font-size:.74rem;color:var(--muted);text-decoration:none;}
.back:hover{color:var(--ink);}
</style>
</head>
<body>
  <div class="box">
    <span class="dot" aria-hidden="true"></span>
    <p>正在開啟履歷 PDF… / Opening résumé PDF…</p>
    <p style="color:var(--muted);font-size:.78rem;">若未自動開啟，請點擊下方連結。<br>If it doesn't open automatically, use the link below.</p>
    <a id="pdf-link" href="Alyssa-Huang-Resume-EN.pdf">開啟履歷 PDF · Open Résumé →</a>
    <a class="back" href="index.html">← 回到作品集 · Back to portfolio</a>
  </div>

  <script>
  // 將 fallback 連結指向正確語言版本（與上方判斷一致）
  (function(){
    var el = document.getElementById("pdf-link");
    if(el && window.__resumePDF){ el.setAttribute("href", window.__resumePDF); }
  })();
  </script>
</body>
</html>
